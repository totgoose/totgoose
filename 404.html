<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Тот Ещё Гусь</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="goose_c.png">
    <style>
        .error-container {
            text-align: center;
            padding: 80px 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: var(--accent-red);
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .error-title {
            font-size: 28px;
            margin-bottom: 15px;
            color: var(--text-dark);
        }
        .error-text {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .error-illustration {
            font-size: 80px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <a href="index.html">
                    <img src="goose_c.png" alt="Тот Ещё Гусь" class="logo">
                </a>
                <div class="logo-text">
                    <h1>Тот Ещё Гусь</h1>
                    <p>Гастрокафе · Москва</p>
                </div>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Меню</a>
                <a href="contacts.html" class="nav-link">Контакты</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="error-container">
            <div class="error-illustration">🦢❓</div>
            <div class="error-code">404</div>
            <h1 class="error-title">Страница не найдена</h1>
            <p class="error-text">
                Кажется, этот гусь улетел в неизвестном направлении.<br>
                Страница, которую вы ищете, не существует или была перемещена.
            </p>
            <a href="index.html" class="back-btn" style="margin-top: 20px;">
                Вернуться на главную
            </a>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <img src="goose_c.png" alt="Тот Ещё Гусь" class="footer-logo">
            <h3>Тот Ещё Гусь</h3>
            <p>© 2026 Гастрокафе. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>
